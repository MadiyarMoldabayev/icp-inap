<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ug1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f8cff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Globe -->
  <g transform="translate(250, 240)">
    <!-- Outer glow -->
    <circle cx="0" cy="0" r="140" fill="#4f8cff" opacity="0.03" filter="url(#mglow)"/>

    <!-- Globe circle -->
    <circle cx="0" cy="0" r="120" fill="url(#ug1)" stroke="#4f8cff" stroke-width="0.5" opacity="0.5"/>

    <!-- Latitude lines -->
    <g stroke="#4f8cff" stroke-width="0.3" opacity="0.15" fill="none">
      <ellipse cx="0" cy="-60" rx="104" ry="20"/>
      <ellipse cx="0" cy="-30" rx="116" ry="15"/>
      <ellipse cx="0" cy="0" rx="120" ry="12"/>
      <ellipse cx="0" cy="30" rx="116" ry="15"/>
      <ellipse cx="0" cy="60" rx="104" ry="20"/>
    </g>

    <!-- Longitude lines -->
    <g stroke="#4f8cff" stroke-width="0.3" opacity="0.15" fill="none">
      <ellipse cx="0" cy="0" rx="30" ry="120"/>
      <ellipse cx="0" cy="0" rx="70" ry="120"/>
      <ellipse cx="0" cy="0" rx="100" ry="120"/>
    </g>

    <!-- Kazakhstan highlighted region -->
    <ellipse cx="30" cy="-30" rx="25" ry="12" fill="#4f8cff" opacity="0.2">
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="3s" repeatCount="indefinite"/>
    </ellipse>

    <!-- New York marker -->
    <circle cx="-80" cy="-25" r="3" fill="#f472b6" opacity="0.7">
      <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="-80" y="-34" text-anchor="middle" fill="#f472b6" font-size="6" opacity="0.5" font-family="Montserrat,sans-serif">NY</text>

    <!-- Astana marker -->
    <circle cx="30" cy="-30" r="3" fill="#22d3ee" opacity="0.8">
      <animate attributeName="r" values="3;5;3" dur="2.5s" repeatCount="indefinite"/>
    </circle>

    <!-- Arc connection NY to Astana -->
    <path d="M-80,-25 Q-20,-80 30,-30" fill="none" stroke="#4f8cff" stroke-width="0.8" opacity="0.3" stroke-dasharray="4 4">
      <animate attributeName="stroke-dashoffset" from="0" to="-16" dur="2s" repeatCount="indefinite"/>
    </path>

    <!-- Rotating ring -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="#a78bfa" stroke-width="0.3" stroke-dasharray="6 12" opacity="0.1">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="40s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Labels -->
  <text x="250" y="410" text-anchor="middle" fill="#4f8cff" font-size="9" font-weight="600" opacity="0.4" font-family="Montserrat,sans-serif">10,000 km — Astana to New York</text>
  <text x="250" y="425" text-anchor="middle" fill="#4f8cff" font-size="7" opacity="0.25" font-family="Montserrat,sans-serif">UN CSW70 · Church Center of the UN · 777 UN Plaza</text>

  <!-- Floating elements -->
  <g opacity="0.08">
    <rect x="60" y="80" width="40" height="50" rx="4" fill="none" stroke="#a78bfa" stroke-width="0.5">
      <animateTransform attributeName="transform" type="translate" values="0,0;5,-8;0,0" dur="7s" repeatCount="indefinite"/>
    </rect>
    <text x="80" y="108" text-anchor="middle" fill="#a78bfa" font-size="7" font-weight="700" font-family="Montserrat,sans-serif">
      <animateTransform attributeName="transform" type="translate" values="0,0;5,-8;0,0" dur="7s" repeatCount="indefinite"/>
      CSW
    </text>
    <text x="80" y="118" text-anchor="middle" fill="#a78bfa" font-size="10" font-weight="700" font-family="Montserrat,sans-serif">
      <animateTransform attributeName="transform" type="translate" values="0,0;5,-8;0,0" dur="7s" repeatCount="indefinite"/>
      70
    </text>
  </g>

  <g opacity="0.06">
    <circle cx="420" cy="100" r="25" fill="none" stroke="#22d3ee" stroke-width="0.5">
      <animateTransform attributeName="transform" type="translate" values="0,0;-4,6;0,0" dur="9s" repeatCount="indefinite"/>
    </circle>
    <text x="420" y="103" text-anchor="middle" fill="#22d3ee" font-size="7" font-weight="600" font-family="Montserrat,sans-serif">
      <animateTransform attributeName="transform" type="translate" values="0,0;-4,6;0,0" dur="9s" repeatCount="indefinite"/>
      ISA
    </text>
  </g>
</svg>
