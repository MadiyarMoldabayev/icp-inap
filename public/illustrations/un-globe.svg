<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ug1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16a34a" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.04"/>
    </linearGradient>
  </defs>

  <!-- Globe -->
  <g transform="translate(250, 240)">
    <!-- Globe circle -->
    <circle cx="0" cy="0" r="120" fill="url(#ug1)" stroke="#16a34a" stroke-width="1.2" opacity="0.7"/>

    <!-- Latitude lines -->
    <g stroke="#16a34a" stroke-width="0.6" opacity="0.25" fill="none">
      <ellipse cx="0" cy="-60" rx="104" ry="20"/>
      <ellipse cx="0" cy="-30" rx="116" ry="15"/>
      <ellipse cx="0" cy="0" rx="120" ry="12"/>
      <ellipse cx="0" cy="30" rx="116" ry="15"/>
      <ellipse cx="0" cy="60" rx="104" ry="20"/>
    </g>

    <!-- Longitude lines -->
    <g stroke="#16a34a" stroke-width="0.6" opacity="0.25" fill="none">
      <ellipse cx="0" cy="0" rx="30" ry="120"/>
      <ellipse cx="0" cy="0" rx="70" ry="120"/>
      <ellipse cx="0" cy="0" rx="100" ry="120"/>
    </g>

    <!-- Kazakhstan highlighted region -->
    <ellipse cx="30" cy="-30" rx="25" ry="12" fill="#16a34a" opacity="0.3">
      <animate attributeName="opacity" values="0.3;0.5;0.3" dur="3s" repeatCount="indefinite"/>
    </ellipse>

    <!-- New York marker -->
    <circle cx="-80" cy="-25" r="4" fill="#0891b2" opacity="0.85">
      <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="-80" y="-36" text-anchor="middle" fill="#0f5132" font-size="8" font-weight="600" opacity="0.7" font-family="Montserrat,sans-serif">NY</text>

    <!-- Astana marker -->
    <circle cx="30" cy="-30" r="4" fill="#16a34a" opacity="0.9">
      <animate attributeName="r" values="4;6;4" dur="2.5s" repeatCount="indefinite"/>
    </circle>

    <!-- Arc connection NY to Astana -->
    <path d="M-80,-25 Q-20,-80 30,-30" fill="none" stroke="#16a34a" stroke-width="1.5" opacity="0.45" stroke-dasharray="4 4">
      <animate attributeName="stroke-dashoffset" from="0" to="-16" dur="2s" repeatCount="indefinite"/>
    </path>

    <!-- Rotating ring -->
    <circle cx="0" cy="0" r="140" fill="none" stroke="#059669" stroke-width="0.6" stroke-dasharray="6 12" opacity="0.2">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="40s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Labels -->
  <text x="250" y="410" text-anchor="middle" fill="#0f5132" font-size="11" font-weight="600" opacity="0.6" font-family="Montserrat,sans-serif">10,000 km — Astana to New York</text>
  <text x="250" y="428" text-anchor="middle" fill="#4a6b53" font-size="9" opacity="0.45" font-family="Montserrat,sans-serif">UN CSW70 · Church Center of the UN · 777 UN Plaza</text>

  <!-- Floating elements -->
  <g opacity="0.3">
    <rect x="60" y="80" width="45" height="55" rx="6" fill="#ffffff" stroke="#059669" stroke-width="0.8">
      <animateTransform attributeName="transform" type="translate" values="0,0;5,-8;0,0" dur="7s" repeatCount="indefinite"/>
    </rect>
    <text x="82" y="108" text-anchor="middle" fill="#0f5132" font-size="9" font-weight="700" font-family="Montserrat,sans-serif">
      <animateTransform attributeName="transform" type="translate" values="0,0;5,-8;0,0" dur="7s" repeatCount="indefinite"/>
      CSW
    </text>
    <text x="82" y="122" text-anchor="middle" fill="#0f5132" font-size="13" font-weight="700" font-family="Montserrat,sans-serif">
      <animateTransform attributeName="transform" type="translate" values="0,0;5,-8;0,0" dur="7s" repeatCount="indefinite"/>
      70
    </text>
  </g>

  <g opacity="0.25">
    <circle cx="420" cy="100" r="28" fill="#ffffff" stroke="#0d9488" stroke-width="0.8">
      <animateTransform attributeName="transform" type="translate" values="0,0;-4,6;0,0" dur="9s" repeatCount="indefinite"/>
    </circle>
    <text x="420" y="104" text-anchor="middle" fill="#0f5132" font-size="10" font-weight="700" font-family="Montserrat,sans-serif">
      <animateTransform attributeName="transform" type="translate" values="0,0;-4,6;0,0" dur="9s" repeatCount="indefinite"/>
      ISA
    </text>
  </g>
</svg>
