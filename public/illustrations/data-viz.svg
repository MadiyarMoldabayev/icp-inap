<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dg1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#4f8cff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#4f8cff" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="dg2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#a78bfa" stop-opacity="0"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Grid lines -->
  <g stroke="white" stroke-width="0.2" opacity="0.05">
    <line x1="60" y1="50" x2="60" y2="350"/><line x1="60" y1="350" x2="560" y2="350"/>
    <line x1="60" y1="275" x2="560" y2="275"/><line x1="60" y1="200" x2="560" y2="200"/>
    <line x1="60" y1="125" x2="560" y2="125"/>
  </g>

  <!-- Area chart - violence cases trend -->
  <path d="M60,320 L160,310 L260,290 L360,240 L460,140 L560,100" fill="none" stroke="#4f8cff" stroke-width="2" opacity="0.6">
    <animate attributeName="d" values="M60,320 L160,310 L260,290 L360,240 L460,140 L560,100;M60,315 L160,305 L260,285 L360,235 L460,135 L560,95;M60,320 L160,310 L260,290 L360,240 L460,140 L560,100" dur="6s" repeatCount="indefinite"/>
  </path>
  <path d="M60,320 L160,310 L260,290 L360,240 L460,140 L560,100 L560,350 L60,350 Z" fill="url(#dg1)" opacity="0.3"/>

  <!-- Second line - women cases -->
  <path d="M60,330 L160,325 L260,310 L360,280 L460,200 L560,165" fill="none" stroke="#a78bfa" stroke-width="1.5" opacity="0.5" stroke-dasharray="6 4"/>
  <path d="M60,330 L160,325 L260,310 L360,280 L460,200 L560,165 L560,350 L60,350 Z" fill="url(#dg2)" opacity="0.2"/>

  <!-- Data points -->
  <g>
    <circle cx="60" cy="320" r="3" fill="#4f8cff" opacity="0.8"/>
    <circle cx="160" cy="310" r="3" fill="#4f8cff" opacity="0.8"/>
    <circle cx="260" cy="290" r="3" fill="#4f8cff" opacity="0.8"/>
    <circle cx="360" cy="240" r="4" fill="#4f8cff" opacity="0.9">
      <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="460" cy="140" r="4" fill="#4f8cff" opacity="0.9">
      <animate attributeName="r" values="4;6;4" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="560" cy="100" r="5" fill="#4f8cff" opacity="1">
      <animate attributeName="r" values="5;7;5" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Year labels -->
  <g fill="white" font-size="9" opacity="0.25" font-family="Montserrat,sans-serif">
    <text x="60" y="370" text-anchor="middle">2020</text>
    <text x="160" y="370" text-anchor="middle">2021</text>
    <text x="260" y="370" text-anchor="middle">2022</text>
    <text x="360" y="370" text-anchor="middle">2023</text>
    <text x="460" y="370" text-anchor="middle">2024</text>
    <text x="560" y="370" text-anchor="middle">2025</text>
  </g>

  <!-- Value labels on key points -->
  <text x="460" y="128" fill="#4f8cff" font-size="10" font-weight="700" text-anchor="middle" font-family="Montserrat,sans-serif" opacity="0.7">104,076</text>
  <text x="560" y="88" fill="#4f8cff" font-size="8" text-anchor="middle" font-family="Montserrat,sans-serif" opacity="0.5">4x growth</text>

  <!-- Legend -->
  <g transform="translate(400,30)">
    <line x1="0" y1="5" x2="20" y2="5" stroke="#4f8cff" stroke-width="2" opacity="0.6"/>
    <text x="26" y="9" fill="white" font-size="8" opacity="0.3" font-family="Montserrat,sans-serif">Total cases</text>
    <line x1="100" y1="5" x2="120" y2="5" stroke="#a78bfa" stroke-width="1.5" opacity="0.5" stroke-dasharray="4 3"/>
    <text x="126" y="9" fill="white" font-size="8" opacity="0.3" font-family="Montserrat,sans-serif">Women</text>
  </g>

  <!-- Donut chart inset -->
  <g transform="translate(130,140)">
    <circle cx="0" cy="0" r="40" fill="none" stroke="white" stroke-width="0.3" opacity="0.05"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#4f8cff" stroke-width="6" opacity="0.4"
      stroke-dasharray="181 70" stroke-dashoffset="0" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="-90 0 0" to="-90 0 0" dur="0.01s"/>
    </circle>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#a78bfa" stroke-width="6" opacity="0.3"
      stroke-dasharray="47 204" stroke-dashoffset="-181" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="40" fill="none" stroke="#22d3ee" stroke-width="6" opacity="0.3"
      stroke-dasharray="24 228" stroke-dashoffset="-228" stroke-linecap="round"/>
    <text x="0" y="-4" text-anchor="middle" fill="white" font-size="11" font-weight="700" font-family="Montserrat,sans-serif" opacity="0.6">72%</text>
    <text x="0" y="10" text-anchor="middle" fill="white" font-size="6" font-family="Montserrat,sans-serif" opacity="0.3">Kazakh</text>
  </g>
</svg>
