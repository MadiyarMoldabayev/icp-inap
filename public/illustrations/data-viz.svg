<svg viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="dg1" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#16a34a" stop-opacity="0"/>
      <stop offset="100%" stop-color="#16a34a" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="dg2" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#059669" stop-opacity="0"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- Grid lines -->
  <g stroke="#0f5132" stroke-width="0.5" opacity="0.1">
    <line x1="60" y1="50" x2="60" y2="350"/><line x1="60" y1="350" x2="560" y2="350"/>
    <line x1="60" y1="275" x2="560" y2="275"/><line x1="60" y1="200" x2="560" y2="200"/>
    <line x1="60" y1="125" x2="560" y2="125"/>
  </g>

  <!-- Area chart - violence cases trend -->
  <path d="M60,320 L160,310 L260,290 L360,240 L460,140 L560,100" fill="none" stroke="#16a34a" stroke-width="2.5" opacity="0.8">
    <animate attributeName="d" values="M60,320 L160,310 L260,290 L360,240 L460,140 L560,100;M60,315 L160,305 L260,285 L360,235 L460,135 L560,95;M60,320 L160,310 L260,290 L360,240 L460,140 L560,100" dur="6s" repeatCount="indefinite"/>
  </path>
  <path d="M60,320 L160,310 L260,290 L360,240 L460,140 L560,100 L560,350 L60,350 Z" fill="url(#dg1)" opacity="0.5"/>

  <!-- Second line - women cases -->
  <path d="M60,330 L160,325 L260,310 L360,280 L460,200 L560,165" fill="none" stroke="#059669" stroke-width="2" opacity="0.6" stroke-dasharray="6 4"/>
  <path d="M60,330 L160,325 L260,310 L360,280 L460,200 L560,165 L560,350 L60,350 Z" fill="url(#dg2)" opacity="0.35"/>

  <!-- Data points -->
  <g>
    <circle cx="60" cy="320" r="4" fill="#16a34a" opacity="0.8"/>
    <circle cx="160" cy="310" r="4" fill="#16a34a" opacity="0.8"/>
    <circle cx="260" cy="290" r="4" fill="#16a34a" opacity="0.8"/>
    <circle cx="360" cy="240" r="5" fill="#16a34a" opacity="0.9">
      <animate attributeName="r" values="5;7;5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="460" cy="140" r="5" fill="#16a34a" opacity="0.9">
      <animate attributeName="r" values="5;7;5" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="560" cy="100" r="6" fill="#16a34a" opacity="1">
      <animate attributeName="r" values="6;8;6" dur="2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Year labels -->
  <g fill="#0f5132" font-size="10" opacity="0.5" font-family="Montserrat,sans-serif" font-weight="500">
    <text x="60" y="372" text-anchor="middle">2020</text>
    <text x="160" y="372" text-anchor="middle">2021</text>
    <text x="260" y="372" text-anchor="middle">2022</text>
    <text x="360" y="372" text-anchor="middle">2023</text>
    <text x="460" y="372" text-anchor="middle">2024</text>
    <text x="560" y="372" text-anchor="middle">2025</text>
  </g>

  <!-- Value labels on key points -->
  <text x="460" y="126" fill="#0f5132" font-size="12" font-weight="700" text-anchor="middle" font-family="Montserrat,sans-serif" opacity="0.8">104,076</text>
  <text x="560" y="86" fill="#16a34a" font-size="10" font-weight="600" text-anchor="middle" font-family="Montserrat,sans-serif" opacity="0.7">4x growth</text>

  <!-- Legend -->
  <g transform="translate(400,30)">
    <line x1="0" y1="5" x2="20" y2="5" stroke="#16a34a" stroke-width="2.5" opacity="0.8"/>
    <text x="26" y="9" fill="#0f5132" font-size="9" opacity="0.6" font-family="Montserrat,sans-serif" font-weight="500">Total cases</text>
    <line x1="110" y1="5" x2="130" y2="5" stroke="#059669" stroke-width="2" opacity="0.6" stroke-dasharray="4 3"/>
    <text x="136" y="9" fill="#0f5132" font-size="9" opacity="0.6" font-family="Montserrat,sans-serif" font-weight="500">Women</text>
  </g>

  <!-- Donut chart inset -->
  <g transform="translate(130,140)">
    <circle cx="0" cy="0" r="42" fill="none" stroke="#d4ead9" stroke-width="1" opacity="0.5"/>
    <circle cx="0" cy="0" r="42" fill="none" stroke="#16a34a" stroke-width="7" opacity="0.6"
      stroke-dasharray="190 74" stroke-dashoffset="0" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="-90 0 0" to="-90 0 0" dur="0.01s"/>
    </circle>
    <circle cx="0" cy="0" r="42" fill="none" stroke="#059669" stroke-width="7" opacity="0.45"
      stroke-dasharray="50 214" stroke-dashoffset="-190" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="42" fill="none" stroke="#0d9488" stroke-width="7" opacity="0.4"
      stroke-dasharray="24 240" stroke-dashoffset="-240" stroke-linecap="round"/>
    <text x="0" y="-4" text-anchor="middle" fill="#0f5132" font-size="14" font-weight="700" font-family="Montserrat,sans-serif" opacity="0.8">72%</text>
    <text x="0" y="12" text-anchor="middle" fill="#0f5132" font-size="8" font-weight="500" font-family="Montserrat,sans-serif" opacity="0.5">Kazakh</text>
  </g>
</svg>
