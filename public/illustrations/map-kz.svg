<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f8cff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="mglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>
  </defs>

  <!-- Simplified Kazakhstan outline -->
  <path d="M120,180 L180,120 L260,100 L340,90 L400,80 L480,85 L540,95 L600,110 L660,100 L720,120 L780,140 L800,180 L790,220 L770,260 L740,290 L700,310 L660,330 L620,340 L580,350 L520,360 L460,370 L400,380 L340,370 L280,350 L230,330 L180,300 L150,260 L130,220 Z"
    fill="url(#mg1)" stroke="#4f8cff" stroke-width="0.8" opacity="0.5"/>

  <!-- City markers with pulse -->
  <!-- Astana (capital) -->
  <circle cx="480" cy="200" r="5" fill="#4f8cff" opacity="0.9">
    <animate attributeName="r" values="5;7;5" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="480" cy="200" r="5" fill="none" stroke="#4f8cff" stroke-width="0.5" opacity="0.4">
    <animate attributeName="r" values="5;20;5" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0;0.4" dur="3s" repeatCount="indefinite"/>
  </circle>
  <text x="480" y="185" text-anchor="middle" fill="#4f8cff" font-size="9" font-weight="600" font-family="Montserrat,sans-serif">Astana</text>

  <!-- Almaty -->
  <circle cx="620" cy="340" r="4" fill="#22d3ee" opacity="0.8">
    <animate attributeName="r" values="4;6;4" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <text x="620" y="360" text-anchor="middle" fill="#22d3ee" font-size="8" font-family="Montserrat,sans-serif">Almaty</text>

  <!-- Shymkent -->
  <circle cx="460" cy="370" r="3.5" fill="#a78bfa" opacity="0.7"/>
  <text x="460" y="390" text-anchor="middle" fill="#a78bfa" font-size="7" font-family="Montserrat,sans-serif">Shymkent</text>

  <!-- Karaganda -->
  <circle cx="520" cy="240" r="3" fill="#f472b6" opacity="0.7"/>
  <text x="520" y="228" text-anchor="middle" fill="#f472b6" font-size="7" font-family="Montserrat,sans-serif">Karaganda</text>

  <!-- Aktobe -->
  <circle cx="280" cy="240" r="3" fill="#22d3ee" opacity="0.6"/>
  <text x="280" y="228" text-anchor="middle" fill="#22d3ee" font-size="7" font-family="Montserrat,sans-serif">Aktobe</text>

  <!-- Semey -->
  <circle cx="640" cy="200" r="3" fill="#a78bfa" opacity="0.6"/>
  <text x="640" y="188" text-anchor="middle" fill="#a78bfa" font-size="7" font-family="Montserrat,sans-serif">Semey</text>

  <!-- Aktau -->
  <circle cx="170" cy="280" r="3" fill="#4f8cff" opacity="0.6"/>
  <text x="170" y="300" text-anchor="middle" fill="#4f8cff" font-size="7" font-family="Montserrat,sans-serif">Aktau</text>

  <!-- Connection lines between cities (research network) -->
  <g stroke="#4f8cff" stroke-width="0.4" opacity="0.15" stroke-dasharray="4 6">
    <line x1="480" y1="200" x2="620" y2="340"/>
    <line x1="480" y1="200" x2="460" y2="370"/>
    <line x1="480" y1="200" x2="520" y2="240"/>
    <line x1="480" y1="200" x2="280" y2="240"/>
    <line x1="480" y1="200" x2="640" y2="200"/>
    <line x1="480" y1="200" x2="170" y2="280"/>
  </g>

  <!-- Label -->
  <text x="780" y="420" fill="#4f8cff" font-size="8" opacity="0.3" font-family="Montserrat,sans-serif" font-weight="600">KAZAKHSTAN</text>
  <text x="780" y="432" fill="#4f8cff" font-size="6" opacity="0.2" font-family="Montserrat,sans-serif">2,724,900 km²</text>
</svg>
