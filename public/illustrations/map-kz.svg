<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16a34a" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.12"/>
    </linearGradient>
  </defs>

  <!-- Kazakhstan outline -->
  <path d="M120,180 L180,120 L260,100 L340,90 L400,80 L480,85 L540,95 L600,110 L660,100 L720,120 L780,140 L800,180 L790,220 L770,260 L740,290 L700,310 L660,330 L620,340 L580,350 L520,360 L460,370 L400,380 L340,370 L280,350 L230,330 L180,300 L150,260 L130,220 Z"
    fill="url(#mg1)" stroke="#16a34a" stroke-width="1.5" opacity="0.8"/>

  <!-- City markers with pulse -->
  <!-- Astana (capital) -->
  <circle cx="480" cy="200" r="6" fill="#16a34a" opacity="0.9">
    <animate attributeName="r" values="6;8;6" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="480" cy="200" r="6" fill="none" stroke="#16a34a" stroke-width="1" opacity="0.5">
    <animate attributeName="r" values="6;22;6" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.5;0;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
  <text x="480" y="183" text-anchor="middle" fill="#0f5132" font-size="11" font-weight="700" font-family="Montserrat,sans-serif">Astana</text>

  <!-- Almaty -->
  <circle cx="620" cy="340" r="5" fill="#0d9488" opacity="0.85">
    <animate attributeName="r" values="5;7;5" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <text x="620" y="362" text-anchor="middle" fill="#0f5132" font-size="10" font-weight="600" font-family="Montserrat,sans-serif">Almaty</text>

  <!-- Shymkent -->
  <circle cx="460" cy="370" r="4.5" fill="#059669" opacity="0.8"/>
  <text x="460" y="392" text-anchor="middle" fill="#0f5132" font-size="9" font-weight="600" font-family="Montserrat,sans-serif">Shymkent</text>

  <!-- Karaganda -->
  <circle cx="520" cy="240" r="4" fill="#0891b2" opacity="0.8"/>
  <text x="520" y="226" text-anchor="middle" fill="#0f5132" font-size="9" font-weight="600" font-family="Montserrat,sans-serif">Karaganda</text>

  <!-- Aktobe -->
  <circle cx="280" cy="240" r="4" fill="#0d9488" opacity="0.75"/>
  <text x="280" y="226" text-anchor="middle" fill="#0f5132" font-size="9" font-weight="600" font-family="Montserrat,sans-serif">Aktobe</text>

  <!-- Semey -->
  <circle cx="640" cy="200" r="4" fill="#059669" opacity="0.75"/>
  <text x="640" y="186" text-anchor="middle" fill="#0f5132" font-size="9" font-weight="600" font-family="Montserrat,sans-serif">Semey</text>

  <!-- Aktau -->
  <circle cx="170" cy="280" r="4" fill="#16a34a" opacity="0.75"/>
  <text x="170" y="302" text-anchor="middle" fill="#0f5132" font-size="9" font-weight="600" font-family="Montserrat,sans-serif">Aktau</text>

  <!-- Connection lines between cities -->
  <g stroke="#16a34a" stroke-width="0.8" opacity="0.3" stroke-dasharray="4 6">
    <line x1="480" y1="200" x2="620" y2="340"/>
    <line x1="480" y1="200" x2="460" y2="370"/>
    <line x1="480" y1="200" x2="520" y2="240"/>
    <line x1="480" y1="200" x2="280" y2="240"/>
    <line x1="480" y1="200" x2="640" y2="200"/>
    <line x1="480" y1="200" x2="170" y2="280"/>
  </g>

  <!-- Label -->
  <text x="780" y="420" fill="#0f5132" font-size="10" opacity="0.5" font-family="Montserrat,sans-serif" font-weight="700">KAZAKHSTAN</text>
  <text x="780" y="436" fill="#0f5132" font-size="8" opacity="0.35" font-family="Montserrat,sans-serif">2,724,900 km²</text>
</svg>
