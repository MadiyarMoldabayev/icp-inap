<svg width="1440" height="900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="blur1" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="80"/>
    </filter>
    <filter id="blur2" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="120"/>
    </filter>
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0ea5e9" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#6366f1" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="g2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#a855f7" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="g3" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#ec4899" stop-opacity="0.03"/>
    </linearGradient>
  </defs>
  <!-- Aurora layers -->
  <ellipse cx="400" cy="200" rx="600" ry="250" fill="url(#g1)" filter="url(#blur2)">
    <animateTransform attributeName="transform" type="translate" values="0,0;60,-30;-40,20;0,0" dur="20s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="900" cy="350" rx="500" ry="200" fill="url(#g2)" filter="url(#blur2)">
    <animateTransform attributeName="transform" type="translate" values="0,0;-50,40;30,-20;0,0" dur="25s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="600" cy="500" rx="700" ry="300" fill="url(#g3)" filter="url(#blur1)">
    <animateTransform attributeName="transform" type="translate" values="0,0;40,30;-60,-10;0,0" dur="18s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Light streaks -->
  <path d="M200,100 Q500,50 800,150 T1400,100" fill="none" stroke="url(#g1)" stroke-width="2" opacity="0.3" filter="url(#blur1)">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,50;0,0" dur="12s" repeatCount="indefinite"/>
  </path>
  <path d="M0,300 Q400,200 700,350 T1440,250" fill="none" stroke="url(#g2)" stroke-width="3" opacity="0.2" filter="url(#blur1)">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,-40;0,0" dur="15s" repeatCount="indefinite"/>
  </path>
</svg>
