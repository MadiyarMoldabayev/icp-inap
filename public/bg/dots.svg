<svg width="800" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="dotsFade" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <mask id="dotsMask">
      <rect width="800" height="800" fill="url(#dotsFade)"/>
    </mask>
    <pattern id="dotPattern" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="0.8" fill="rgba(255,255,255,0.08)"/>
    </pattern>
  </defs>
  <rect width="800" height="800" fill="url(#dotPattern)" mask="url(#dotsMask)"/>
</svg>
