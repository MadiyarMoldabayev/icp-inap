<svg width="1000" height="1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="topoFade" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="80%" stop-color="white" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <mask id="topoMask">
      <rect width="1000" height="1000" fill="url(#topoFade)"/>
    </mask>
  </defs>
  <g mask="url(#topoMask)" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.6">
    <circle cx="500" cy="500" r="50"/>
    <circle cx="500" cy="500" r="100"/>
    <circle cx="500" cy="500" r="150"/>
    <circle cx="500" cy="500" r="200"/>
    <circle cx="500" cy="500" r="250"/>
    <circle cx="500" cy="500" r="300"/>
    <circle cx="500" cy="500" r="350"/>
    <circle cx="500" cy="500" r="400"/>
    <circle cx="500" cy="500" r="450"/>
    <circle cx="500" cy="500" r="500"/>
    <!-- Offset circles for topo effect -->
    <circle cx="350" cy="400" r="80"/>
    <circle cx="350" cy="400" r="140"/>
    <circle cx="350" cy="400" r="200"/>
    <circle cx="350" cy="400" r="260"/>
    <circle cx="650" cy="350" r="60"/>
    <circle cx="650" cy="350" r="120"/>
    <circle cx="650" cy="350" r="180"/>
    <circle cx="650" cy="350" r="240"/>
    <circle cx="450" cy="600" r="70"/>
    <circle cx="450" cy="600" r="130"/>
    <circle cx="450" cy="600" r="190"/>
    <circle cx="450" cy="600" r="250"/>
  </g>
</svg>
