<svg width="1200" height="1200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="smallGrid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.015)" stroke-width="0.5"/>
    </pattern>
    <pattern id="grid" width="200" height="200" patternUnits="userSpaceOnUse">
      <rect width="200" height="200" fill="url(#smallGrid)"/>
      <path d="M 200 0 L 0 0 0 200" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="0.5"/>
    </pattern>
    <radialGradient id="fade" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <mask id="fadeMask">
      <rect width="1200" height="1200" fill="url(#fade)"/>
    </mask>
  </defs>
  <rect width="1200" height="1200" fill="url(#grid)" mask="url(#fadeMask)"/>
</svg>
